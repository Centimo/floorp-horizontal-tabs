// Floorp Horizontal Tabs — autoconfig.cfg
// skip first line

pref("htabs.diag.1_start", true);

// ============================================================
// Read CSS file content at startup (sync)
// ============================================================
var htabsCssContent = "";
try {
  var cssFile = Services.dirsvc.get("GreD", Ci.nsIFile);
  cssFile.append("horizontal_tabs.css");
  if (cssFile.exists()) {
    htabsCssContent = Cu.readUTF8URI(Services.io.newFileURI(cssFile));
    pref("htabs.diag.2_css_read", true);
  }
  else {
    pref("htabs.diag.2_css_missing", true);
  }
} catch(e) {
  pref("htabs.diag.2_css_error", e + "");
}

// ============================================================
// Utility: wait for element to appear in DOM
// ============================================================
function waitForElement(doc, selector, timeout) {
  return new Promise(function(resolve) {
    var el = doc.querySelector(selector);
    if (el) { resolve(el); return; }
    var observer = new doc.defaultView.MutationObserver(function() {
      el = doc.querySelector(selector);
      if (el) { observer.disconnect(); clearTimeout(timer); resolve(el); }
    });
    observer.observe(doc.documentElement, { childList: true, subtree: true });
    var timer = doc.defaultView.setTimeout(function() {
      observer.disconnect(); resolve(null);
    }, timeout);
  });
}

// ============================================================
// Window observer
// ============================================================
try {
  Services.obs.addObserver({
    observe: function(subject) {
      subject.addEventListener("load", function() {
        if (subject.document.documentURI !== "chrome://browser/content/browser.xhtml") return;
        waitForElement(subject.document, "#tabbrowser-tabs", 5000).then(function(tabs) {
          if (!tabs) {
            subject.console.error("htabs: #tabbrowser-tabs not found within 5s");
            return;
          }
          try {
            initHorizontalTabs(subject.document, subject);
          } catch(e) {
            subject.console.error("htabs initHorizontalTabs:", e);
          }
        });
      }, { once: true });
    }
  }, "chrome-document-global-created", false);

  pref("htabs.diag.3_observer", true);
} catch(e) {
  pref("htabs.diag.3_observer_error", e + "");
}


// ============================================================
// Modules
// ============================================================

function moduleInjectCSS(doc, win) {
  if (htabsCssContent && !doc.getElementById("htabs-styles")) {
    var style = doc.createElement("style");
    style.id = "htabs-styles";
    style.textContent = htabsCssContent;
    doc.head.appendChild(style);
  }
}

function moduleOrientFix(doc, win, cleanup) {
  var ids = ["pinned-tabs-container", "tabbrowser-tabs", "tabbrowser-arrowscrollbox", "vertical-pinned-tabs-splitter"];

  function forceHorizontal() {
    for (var i = 0; i < ids.length; i++) {
      var el = doc.getElementById(ids[i]);
      if (el && el.getAttribute("orient") !== "horizontal") {
        el.setAttribute("orient", "horizontal");
      }
    }
  }

  forceHorizontal();

  // Floorp may reset orient to "vertical" after our init — watch and override
  var tabs = doc.getElementById("tabbrowser-tabs");
  if (tabs) {
    var obs = new win.MutationObserver(function(mutations) {
      for (var i = 0; i < mutations.length; i++) {
        if (mutations[i].target.getAttribute("orient") !== "horizontal") {
          forceHorizontal();
          return;
        }
      }
    });
    obs.observe(tabs, { attributes: true, attributeFilter: ["orient"] });
    cleanup.push(function() { obs.disconnect(); });
  }
}

function moduleInlineStyles(doc, win) {
  var ptc = doc.getElementById("pinned-tabs-container");
  var tabs = doc.getElementById("tabbrowser-tabs");
  var box = doc.getElementById("tabbrowser-arrowscrollbox");

  if (ptc) {
    ptc.style.setProperty("height", "120px", "important");
    ptc.style.setProperty("max-height", "120px", "important");
  }

  if (tabs) {
    tabs.style.setProperty("height", "120px", "important");
    tabs.style.setProperty("max-height", "120px", "important");
  }

  if (box) {
    box.style.setProperty("height", "120px", "important");
    box.style.setProperty("max-height", "120px", "important");
    box.style.setProperty("margin-left", "-4px", "important");
  }
}

function moduleShadowScrollbox(doc, win) {
  var box = doc.getElementById("tabbrowser-arrowscrollbox");
  if (box && box.shadowRoot) {
    var scrollbox = box.shadowRoot.querySelector("scrollbox");
    if (scrollbox) {
      scrollbox.style.setProperty("overflow", "hidden", "important");
    }
  }

  var ptc = doc.getElementById("pinned-tabs-container");
  if (ptc && ptc.shadowRoot) {
    var ptcScrollbox = ptc.shadowRoot.querySelector("scrollbox");
    if (ptcScrollbox) {
      ptcScrollbox.style.setProperty("overflow", "hidden", "important");
    }
  }
}

function moduleDomRelocation(doc, win) {
  var tabsToolbar = doc.getElementById("TabsToolbar");
  var verticalTabs = doc.getElementById("vertical-tabs");
  var newTabBtn = doc.getElementById("vertical-tabs-newtab-button");
  var sidebarMain = doc.getElementById("sidebar-main");

  if (tabsToolbar && verticalTabs) {
    tabsToolbar.appendChild(verticalTabs);
  }

  if (newTabBtn && sidebarMain) {
    newTabBtn.after(sidebarMain);
  }
}

function applySidebarStyles(sidebarMain, cleanup) {
  if (!sidebarMain) return;

  sidebarMain.hidden = false;
  var hiddenObs = new sidebarMain.ownerDocument.defaultView.MutationObserver(function() {
    if (sidebarMain.hidden) sidebarMain.hidden = false;
  });
  hiddenObs.observe(sidebarMain, { attributes: true, attributeFilter: ["hidden"] });
  cleanup.push(function() { hiddenObs.disconnect(); });

  var innerSidebar = sidebarMain.querySelector("sidebar-main");
  if (!innerSidebar || !innerSidebar.shadowRoot) return;

  var wrapper = innerSidebar.shadowRoot.querySelector(".wrapper");
  if (!wrapper) return;

  var shadowStyle = innerSidebar.shadowRoot.querySelector("#htabs-sidebar-style");
  if (!shadowStyle) {
    shadowStyle = innerSidebar.shadowRoot.ownerDocument.createElement("style");
    shadowStyle.id = "htabs-sidebar-style";
    shadowStyle.textContent = [
      "splitter { display: none !important; }",
      ".buttons-wrapper { flex-direction: column !important; margin-top: 8px !important; }",
      "button-group {",
      "  display: grid !important;",
      "  grid-template-columns: repeat(3, 38px) !important;",
      "  grid-template-rows: repeat(2, 38px) !important;",
      "  gap: 0 !important;",
      "  padding: 0 !important;",
      "  margin: 0 !important;",
      "}",
      "moz-button {",
      "  visibility: visible !important;",
      "  width: 38px !important;",
      "  height: 38px !important;",
      "  --button-outer-padding-inline: 0 !important;",
      "  --button-outer-padding-block: 0 !important;",
      "  --button-outer-padding-inline-start: 0 !important;",
      "  --button-outer-padding-inline-end: 0 !important;",
      "  --button-outer-padding-block-start: 0 !important;",
      "  --button-outer-padding-block-end: 0 !important;",
      "}"
    ].join("\n");
    innerSidebar.shadowRoot.prepend(shadowStyle);
  }

}

function moduleStyleSidebar(doc, win, cleanup) {
  function tryApply(sidebarMain, retries) {
    var innerSidebar = sidebarMain.querySelector("sidebar-main");
    var sr = innerSidebar && innerSidebar.shadowRoot;
    var wrapper = sr && sr.querySelector(".wrapper");
    var ready = wrapper && wrapper.querySelector("button-group");
    if (ready) {
      applySidebarStyles(sidebarMain, cleanup);
      return;
    }
    if (retries > 0) {
      win.setTimeout(function() { tryApply(sidebarMain, retries - 1); }, 200);
    }
    else {
      win.console.warn("htabs: sidebar Shadow DOM not ready after retries");
    }
  }

  var sidebarMain = doc.getElementById("sidebar-main");
  if (sidebarMain) {
    tryApply(sidebarMain, 15);
    return;
  }
  waitForElement(doc, "#sidebar-main", 3000).then(function(el) {
    if (el) tryApply(el, 15);
  });
}

function moduleTabObserver(doc, win, cleanup) {
  var tabs = doc.getElementById("tabbrowser-tabs");
  if (!tabs) return;

  var newTabBtn = doc.getElementById("vertical-tabs-newtab-button");
  var box = doc.getElementById("tabbrowser-arrowscrollbox");
  var ptc = doc.getElementById("pinned-tabs-container");
  var rafPending = false;

  function getColsPerRow() {
    if (!box) return 6;
    return Math.max(1, Math.floor(box.getBoundingClientRect().width / 150));
  }

  function scheduleUpdate() {
    if (rafPending) return;
    rafPending = true;
    win.requestAnimationFrame(function() {
      rafPending = false;

      doc.querySelectorAll(".tabbrowser-tab:not([pinned]):not([fadein])").forEach(function(t) {
        t.remove();
      });

      var normalTabs = doc.querySelectorAll(".tabbrowser-tab:not([pinned])[fadein]");
      var cols = getColsPerRow();

      // Mark first-column and last-row tabs
      var lastRowStart = normalTabs.length > 0 ? Math.floor((normalTabs.length - 1) / cols) * cols : 0;
      for (var i = 0; i < normalTabs.length; i++) {
        if (i % cols === 0) normalTabs[i].setAttribute("data-htabs-firstcol", "");
        else normalTabs[i].removeAttribute("data-htabs-firstcol");
        if (i >= lastRowStart) normalTabs[i].setAttribute("data-htabs-lastrow", "");
        else normalTabs[i].removeAttribute("data-htabs-lastrow");
      }

      if (newTabBtn) {
        var maxVisible = Math.max(3, cols * 3);
        if (normalTabs.length >= maxVisible) {
          newTabBtn.setAttribute("data-htabs-hidden", "");
        }
        else {
          newTabBtn.removeAttribute("data-htabs-hidden");
        }
      }

      if (ptc) {
        var pinnedCount = doc.querySelectorAll(".tabbrowser-tab[pinned]").length;
        var columns = Math.ceil(pinnedCount / 3);
        var minWidth = Math.max(160, columns * 40);
        ptc.style.setProperty("min-width", minWidth + "px", "important");
      }
    });
  }

  scheduleUpdate();

  var tabObs = new win.MutationObserver(scheduleUpdate);
  tabObs.observe(tabs, {
    childList: true,
    subtree: true,
    attributes: true,
    attributeFilter: ["fadein", "pinned"]
  });

  win.addEventListener("resize", scheduleUpdate);
  cleanup.push(function() {
    tabObs.disconnect();
    win.removeEventListener("resize", scheduleUpdate);
  });
}


function moduleTabDragFix(doc, win) {
  var tabsEl = doc.getElementById("tabbrowser-tabs");
  if (!tabsEl || !tabsEl.tabDragAndDrop) return;

  var dnd = tabsEl.tabDragAndDrop;
  if (!dnd._isContainerVerticalPinnedGrid || !dnd.startTabDrag || !dnd._animateExpandedPinnedTabMove) return;

  function getGridTabs(draggedTab) {
    var numPinned = win.gBrowser.pinnedTabCount;
    var allVisible = tabsEl.visibleTabs;
    if (draggedTab.pinned) return allVisible.slice(0, numPinned);
    return allVisible.slice(numPinned);
  }

  function getMaxTabsPerRow() {
    var box = doc.getElementById("tabbrowser-arrowscrollbox");
    if (!box) return 6;
    return Math.max(1, Math.floor(box.getBoundingClientRect().width / 150));
  }

  // 1. Grid check: true for all tabs in our layout
  var origIsGrid = dnd._isContainerVerticalPinnedGrid.bind(dnd);
  dnd._isContainerVerticalPinnedGrid = function(tab) {
    return origIsGrid(tab) || !tab.pinned;
  };

  // 2. Compute _maxTabsPerRow for normal tabs on drag start
  var origStartTabDrag = dnd.startTabDrag.bind(dnd);
  dnd.startTabDrag = function(event, tab, fromTabList) {
    origStartTabDrag(event, tab, fromTabList);
    var draggedTab = tab || event.dataTransfer.mozGetDataAt(win.TAB_DROP_TYPE, 0);
    if (draggedTab && !draggedTab.pinned) {
      dnd._maxTabsPerRow = getMaxTabsPerRow();
    }
  };

  // 3. Replace _animateExpandedPinnedTabMove with version that handles both pinned and normal
  var origAnimateGrid = dnd._animateExpandedPinnedTabMove.bind(dnd);
  dnd._animateExpandedPinnedTabMove = function(event) {
    var draggedTab = event.dataTransfer.mozGetDataAt(win.TAB_DROP_TYPE, 0);
    if (!draggedTab || draggedTab.pinned) {
      origAnimateGrid(event);
      return;
    }

    // --- 2D grid drag for normal tabs ---
    var dragData = draggedTab._dragData;
    var movingTabs = dragData.movingTabs;
    var movingTabsSet = dragData.movingTabsSet;

    dragData.animLastScreenX = dragData.animLastScreenX || dragData.screenX;
    dragData.animLastScreenY = dragData.animLastScreenY || dragData.screenY;

    if (event.screenX == dragData.animLastScreenX && event.screenY == dragData.animLastScreenY) return;

    var gridTabs = getGridTabs(draggedTab);
    dragData.animLastScreenX = event.screenX;
    dragData.animLastScreenY = event.screenY;

    var tabRect = draggedTab.getBoundingClientRect();
    var tabWidth = tabRect.width;
    var tabHeight = tabRect.height;
    if (!tabWidth || !tabHeight) return;
    dragData.tabWidth = tabWidth;
    dragData.tabHeight = tabHeight;

    var translateX = event.screenX - dragData.screenX;
    var translateY = event.screenY - dragData.screenY;

    // Constrain within tab strip
    var tabsBounds = win.windowUtils.getBoundsWithoutFlushing(tabsEl);
    var startScreenX = draggedTab.screenX;
    var startScreenY = draggedTab.screenY;
    translateX = Math.min(Math.max(translateX, tabsEl.screenX - startScreenX), tabsEl.screenX + tabsBounds.width - startScreenX - tabWidth);
    translateY = Math.min(Math.max(translateY, tabsEl.screenY - startScreenY), tabsEl.screenY + tabsBounds.height - startScreenY - tabHeight);

    for (var mi = 0; mi < movingTabs.length; mi++) {
      movingTabs[mi].style.transform = "translate(" + translateX + "px, " + translateY + "px)";
    }
    dragData.translateX = translateX;
    dragData.translateY = translateY;

    // Find drop position in 2D (row-major grid)
    var filtered = gridTabs.filter(function(t) { return !movingTabsSet.has(t) || t == draggedTab; });
    if (filtered.length < 2) return;

    var tabCenterX = startScreenX + translateX + tabWidth / 2;
    var tabCenterY = startScreenY + translateY + tabHeight / 2;
    var maxPerRow = dnd._maxTabsPerRow;

    var dragFilteredIdx = -1;
    for (var fi = 0; fi < filtered.length; fi++) {
      if (filtered[fi] == draggedTab) { dragFilteredIdx = fi; break; }
    }
    if (dragFilteredIdx < 0) return;

    function getTabShift(filteredIdx, dropIdx) {
      if (filteredIdx == dragFilteredIdx) return [0, 0];
      if (filteredIdx < dragFilteredIdx && filteredIdx >= dropIdx) {
        var tabRow = Math.floor(filteredIdx / maxPerRow);
        var shiftedRow = Math.floor((filteredIdx + 1) / maxPerRow);
        if (tabRow != shiftedRow) return [-(tabWidth * (maxPerRow - 1)), tabHeight];
        return [tabWidth, 0];
      }
      if (filteredIdx > dragFilteredIdx && filteredIdx < dropIdx) {
        var tabRow2 = Math.floor(filteredIdx / maxPerRow);
        var shiftedRow2 = Math.floor((filteredIdx - 1) / maxPerRow);
        if (tabRow2 != shiftedRow2) return [tabWidth * (maxPerRow - 1), -tabHeight];
        return [-tabWidth, 0];
      }
      return [0, 0];
    }

    // Grid origin from first tab's layout position (unaffected by CSS transform)
    var gridOriginX = filtered[0].screenX;
    var gridOriginY = filtered[0].screenY;

    var cursorCol = Math.floor((tabCenterX - gridOriginX) / tabWidth);
    var cursorRow = Math.floor((tabCenterY - gridOriginY) / tabHeight);
    cursorCol = Math.max(0, Math.min(cursorCol, maxPerRow - 1));
    cursorRow = Math.max(0, cursorRow);

    var newDropIdx = cursorRow * maxPerRow + cursorCol;
    newDropIdx = Math.max(0, Math.min(newDropIdx, filtered.length - 1));

    // Convert virtual grid position to filtered-array drop index
    var dropIdx;
    if (newDropIdx < dragFilteredIdx) {
      dropIdx = newDropIdx;
    }
    else if (newDropIdx > dragFilteredIdx) {
      dropIdx = newDropIdx + 1;
    }
    else {
      dropIdx = dragFilteredIdx;
    }
    dropIdx = Math.max(0, Math.min(dropIdx, filtered.length));

    if (dropIdx == dragData.animDropFilteredIdx) return;
    dragData.animDropFilteredIdx = dropIdx;

    // Set dropElement and dropBefore for Firefox's moveTabs
    if (dropIdx < dragFilteredIdx) {
      dragData.dropElement = filtered[dropIdx];
      dragData.dropBefore = true;
    }
    else if (dropIdx > dragFilteredIdx) {
      dragData.dropElement = filtered[Math.min(dropIdx - 1, filtered.length - 1)];
      dragData.dropBefore = false;
    }
    else {
      dragData.dropElement = draggedTab;
      dragData.dropBefore = true;
    }

    for (var ti = 0; ti < filtered.length; ti++) {
      if (ti != dragFilteredIdx) {
        var s = getTabShift(ti, dropIdx);
        filtered[ti].style.transform = (s[0] || s[1]) ? "translate(" + s[0] + "px, " + s[1] + "px)" : "";
      }
    }
  };
}


// ============================================================
// Orchestrator
// ============================================================

function initHorizontalTabs(doc, win) {
  // Feature detection
  if (!Services.prefs.getBoolPref("sidebar.verticalTabs", false)) {
    win.console.log("htabs: sidebar.verticalTabs is false, skipping");
    pref("htabs.diag.4_verticalTabs_disabled", true);
    return;
  }
  pref("htabs.diag.4_verticalTabs_enabled", true);

  // Cleanup registry — modules push disconnect/removeListener callbacks here
  var cleanup = [];

  var modules = [
    ["InjectCSS",       moduleInjectCSS],
    ["OrientFix",       moduleOrientFix],
    ["InlineStyles",    moduleInlineStyles],
    ["ShadowScrollbox", moduleShadowScrollbox],
    ["DomRelocation",   moduleDomRelocation],
    ["StyleSidebar",    moduleStyleSidebar],
    ["TabObserver",     moduleTabObserver],
    ["TabDragFix",      moduleTabDragFix]
  ];

  for (var i = 0; i < modules.length; i++) {
    var name = modules[i][0];
    var fn = modules[i][1];
    try {
      fn(doc, win, cleanup);
    } catch(e) {
      win.console.error("htabs module " + name + ":", e);
    }
  }

  // Clean up observers and listeners when window closes
  win.addEventListener("unload", function() {
    for (var j = 0; j < cleanup.length; j++) {
      try { cleanup[j](); } catch(e) {}
    }
    cleanup.length = 0;
  }, { once: true });

  pref("htabs.diag.5_init_done", true);
}
