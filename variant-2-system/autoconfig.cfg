// Floorp Horizontal Tabs — autoconfig.cfg
// skip first line

pref("htabs.diag.1_start", true);

// ============================================================
// Read CSS file content at startup (sync)
// ============================================================
var htabsCssContent = "";
try {
  var cssFile = Services.dirsvc.get("GreD", Ci.nsIFile);
  cssFile.append("horizontal_tabs.css");
  if (cssFile.exists()) {
    htabsCssContent = Cu.readUTF8URI(Services.io.newFileURI(cssFile));
    pref("htabs.diag.2_css_read", true);
  }
  else {
    pref("htabs.diag.2_css_missing", true);
  }
} catch(e) {
  pref("htabs.diag.2_css_error", e + "");
}

// ============================================================
// Utility: wait for element to appear in DOM
// ============================================================
function waitForElement(doc, selector, timeout) {
  return new Promise(function(resolve) {
    var el = doc.querySelector(selector);
    if (el) { resolve(el); return; }
    var observer = new doc.defaultView.MutationObserver(function() {
      el = doc.querySelector(selector);
      if (el) { observer.disconnect(); clearTimeout(timer); resolve(el); }
    });
    observer.observe(doc.documentElement, { childList: true, subtree: true });
    var timer = doc.defaultView.setTimeout(function() {
      observer.disconnect(); resolve(null);
    }, timeout);
  });
}

// ============================================================
// Window observer
// ============================================================
try {
  var MAX_NORMAL_TABS = 18;

  Services.obs.addObserver({
    observe: function(subject) {
      subject.addEventListener("load", function() {
        if (subject.document.documentURI !== "chrome://browser/content/browser.xhtml") return;
        waitForElement(subject.document, "#tabbrowser-tabs", 5000).then(function(tabs) {
          if (!tabs) {
            subject.console.error("htabs: #tabbrowser-tabs not found within 5s");
            return;
          }
          try {
            initHorizontalTabs(subject.document, subject);
          } catch(e) {
            subject.console.error("htabs initHorizontalTabs:", e);
          }
        });
      }, { once: true });
    }
  }, "chrome-document-global-created", false);

  pref("htabs.diag.3_observer", true);
} catch(e) {
  pref("htabs.diag.3_observer_error", e + "");
}


// ============================================================
// Modules
// ============================================================

function moduleInjectCSS(doc, win) {
  if (htabsCssContent) {
    var style = doc.createElement("style");
    style.id = "htabs-styles";
    style.textContent = htabsCssContent;
    doc.head.appendChild(style);
  }
}

function moduleOrientFix(doc, win) {
  var ids = ["pinned-tabs-container", "tabbrowser-tabs", "tabbrowser-arrowscrollbox", "vertical-pinned-tabs-splitter"];

  function forceHorizontal() {
    for (var i = 0; i < ids.length; i++) {
      var el = doc.getElementById(ids[i]);
      if (el && el.getAttribute("orient") !== "horizontal") {
        el.setAttribute("orient", "horizontal");
      }
    }
  }

  forceHorizontal();

  // Floorp may reset orient to "vertical" after our init — watch and override
  var tabs = doc.getElementById("tabbrowser-tabs");
  if (tabs) {
    new win.MutationObserver(function(mutations) {
      for (var i = 0; i < mutations.length; i++) {
        if (mutations[i].target.getAttribute("orient") !== "horizontal") {
          forceHorizontal();
          return;
        }
      }
    }).observe(tabs, { attributes: true, attributeFilter: ["orient"] });
  }
}

function moduleInlineStyles(doc, win) {
  var ptc = doc.getElementById("pinned-tabs-container");
  var tabs = doc.getElementById("tabbrowser-tabs");
  var box = doc.getElementById("tabbrowser-arrowscrollbox");

  if (ptc) {
    ptc.style.setProperty("height", "120px", "important");
    ptc.style.setProperty("max-height", "120px", "important");
  }

  if (tabs) {
    tabs.style.setProperty("height", "120px", "important");
    tabs.style.setProperty("max-height", "120px", "important");
  }

  if (box) {
    box.style.setProperty("height", "120px", "important");
    box.style.setProperty("max-height", "120px", "important");
    box.style.setProperty("margin-left", "-4px", "important");
  }
}

function moduleShadowScrollbox(doc, win) {
  var box = doc.getElementById("tabbrowser-arrowscrollbox");
  if (box && box.shadowRoot) {
    var scrollbox = box.shadowRoot.querySelector("scrollbox");
    if (scrollbox) {
      scrollbox.style.setProperty("overflow", "hidden", "important");
    }
  }

  var ptc = doc.getElementById("pinned-tabs-container");
  if (ptc && ptc.shadowRoot) {
    var ptcScrollbox = ptc.shadowRoot.querySelector("scrollbox");
    if (ptcScrollbox) {
      ptcScrollbox.style.setProperty("overflow", "hidden", "important");
    }
  }
}

function moduleDomRelocation(doc, win) {
  var tabsToolbar = doc.getElementById("TabsToolbar");
  var verticalTabs = doc.getElementById("vertical-tabs");
  var newTabBtn = doc.getElementById("vertical-tabs-newtab-button");
  var sidebarMain = doc.getElementById("sidebar-main");

  if (tabsToolbar && verticalTabs) {
    tabsToolbar.appendChild(verticalTabs);
  }

  if (newTabBtn && sidebarMain) {
    newTabBtn.after(sidebarMain);
  }
}

function applySidebarStyles(sidebarMain) {
  if (!sidebarMain) return;

  sidebarMain.hidden = false;
  new sidebarMain.ownerDocument.defaultView.MutationObserver(function() {
    if (sidebarMain.hidden) sidebarMain.hidden = false;
  }).observe(sidebarMain, { attributes: true, attributeFilter: ["hidden"] });

  var innerSidebar = sidebarMain.querySelector("sidebar-main");
  if (!innerSidebar || !innerSidebar.shadowRoot) return;

  var wrapper = innerSidebar.shadowRoot.querySelector(".wrapper");
  if (!wrapper) return;

  var shadowStyle = innerSidebar.shadowRoot.querySelector("#htabs-sidebar-style");
  if (!shadowStyle) {
    shadowStyle = innerSidebar.shadowRoot.ownerDocument.createElement("style");
    shadowStyle.id = "htabs-sidebar-style";
    shadowStyle.textContent = [
      "splitter { display: none !important; }",
      ".buttons-wrapper { flex-direction: column !important; margin-top: 8px !important; }",
      "button-group {",
      "  display: grid !important;",
      "  grid-template-columns: repeat(3, 38px) !important;",
      "  grid-template-rows: repeat(2, 38px) !important;",
      "  gap: 0 !important;",
      "  padding: 0 !important;",
      "  margin: 0 !important;",
      "}",
      "moz-button {",
      "  visibility: visible !important;",
      "  width: 38px !important;",
      "  height: 38px !important;",
      "  --button-outer-padding-inline: 0 !important;",
      "  --button-outer-padding-block: 0 !important;",
      "  --button-outer-padding-inline-start: 0 !important;",
      "  --button-outer-padding-inline-end: 0 !important;",
      "  --button-outer-padding-block-start: 0 !important;",
      "  --button-outer-padding-block-end: 0 !important;",
      "}"
    ].join("\n");
    innerSidebar.shadowRoot.prepend(shadowStyle);
  }

}

function moduleStyleSidebar(doc, win) {
  function tryApply(sidebarMain, retries) {
    var innerSidebar = sidebarMain.querySelector("sidebar-main");
    var sr = innerSidebar && innerSidebar.shadowRoot;
    var wrapper = sr && sr.querySelector(".wrapper");
    var ready = wrapper && wrapper.querySelector("button-group");
    if (ready) {
      applySidebarStyles(sidebarMain);
      return;
    }
    if (retries > 0) {
      win.setTimeout(function() { tryApply(sidebarMain, retries - 1); }, 200);
    }
  }

  var sidebarMain = doc.getElementById("sidebar-main");
  if (sidebarMain) {
    tryApply(sidebarMain, 15);
    return;
  }
  waitForElement(doc, "#sidebar-main", 3000).then(function(el) {
    if (el) tryApply(el, 15);
  });
}

function moduleTabObserver(doc, win) {
  var tabs = doc.getElementById("tabbrowser-tabs");
  if (!tabs) return;

  var newTabBtn = doc.getElementById("vertical-tabs-newtab-button");
  var ptc = doc.getElementById("pinned-tabs-container");
  var rafPending = false;

  function scheduleUpdate() {
    if (rafPending) return;
    rafPending = true;
    win.requestAnimationFrame(function() {
      rafPending = false;

      doc.querySelectorAll(".tabbrowser-tab:not([pinned]):not([fadein])").forEach(function(t) {
        t.remove();
      });

      if (newTabBtn) {
        var count = doc.querySelectorAll(".tabbrowser-tab:not([pinned])[fadein]").length;
        if (count >= MAX_NORMAL_TABS) {
          newTabBtn.setAttribute("data-htabs-hidden", "");
        }
        else {
          newTabBtn.removeAttribute("data-htabs-hidden");
        }
      }

      if (ptc) {
        var pinnedCount = doc.querySelectorAll(".tabbrowser-tab[pinned]").length;
        var columns = Math.ceil(pinnedCount / 3);
        var minWidth = Math.max(160, columns * 40);
        ptc.style.setProperty("min-width", minWidth + "px", "important");
      }
    });
  }

  scheduleUpdate();

  new win.MutationObserver(scheduleUpdate).observe(tabs, {
    childList: true,
    subtree: true,
    attributes: true,
    attributeFilter: ["fadein", "pinned"]
  });
}


// ============================================================
// Orchestrator
// ============================================================

function initHorizontalTabs(doc, win) {
  // Feature detection
  if (!Services.prefs.getBoolPref("sidebar.verticalTabs", false)) {
    win.console.log("htabs: sidebar.verticalTabs is false, skipping");
    pref("htabs.diag.4_verticalTabs_disabled", true);
    return;
  }
  pref("htabs.diag.4_verticalTabs_enabled", true);

  var modules = [
    ["InjectCSS",       moduleInjectCSS],
    ["OrientFix",       moduleOrientFix],
    ["InlineStyles",    moduleInlineStyles],
    ["ShadowScrollbox", moduleShadowScrollbox],
    ["DomRelocation",   moduleDomRelocation],
    ["StyleSidebar",    moduleStyleSidebar],
    ["TabObserver",     moduleTabObserver]
  ];

  for (var i = 0; i < modules.length; i++) {
    var name = modules[i][0];
    var fn = modules[i][1];
    try {
      fn(doc, win);
    } catch(e) {
      win.console.error("htabs module " + name + ":", e);
    }
  }

  pref("htabs.diag.5_init_done", true);
}
