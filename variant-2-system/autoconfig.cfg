// Floorp Horizontal Tabs — autoconfig.cfg
// skip first line

pref("htabs.diag.1_start", true);

// ============================================================
// Read CSS file content at startup (sync)
// ============================================================
var htabsCssContent = "";
try {
  var cssFile = Services.dirsvc.get("GreD", Ci.nsIFile);
  cssFile.append("horizontal_tabs.css");
  if (cssFile.exists()) {
    htabsCssContent = Cu.readUTF8URI(Services.io.newFileURI(cssFile));
    pref("htabs.diag.2_css_read", true);
  }
  else {
    pref("htabs.diag.2_css_missing", true);
  }
} catch(e) {
  pref("htabs.diag.2_css_error", e + "");
}

// ============================================================
// Window observer
// ============================================================
try {
  var MAX_NORMAL_TABS = 18;

  Services.obs.addObserver({
    observe: function(subject) {
      subject.addEventListener("load", function() {
        if (subject.document.documentURI !== "chrome://browser/content/browser.xhtml") return;
        subject.setTimeout(function() {
          try {
            initHorizontalTabs(subject);
          } catch(e) {
            subject.console.error("htabs initHorizontalTabs:", e);
          }
        }, 200);
      }, { once: true });
    }
  }, "chrome-document-global-created", false);

  pref("htabs.diag.3_observer", true);
} catch(e) {
  pref("htabs.diag.3_observer_error", e + "");
}


function initHorizontalTabs(win) {
  var doc = win.document;

  // --- Inject CSS as <style> element ---

  if (htabsCssContent) {
    var style = doc.createElement("style");
    style.id = "htabs-styles";
    style.textContent = htabsCssContent;
    doc.head.appendChild(style);
  }

  var ptc = doc.getElementById("pinned-tabs-container");
  var tabs = doc.getElementById("tabbrowser-tabs");
  var box = doc.getElementById("tabbrowser-arrowscrollbox");
  var tabsToolbar = doc.getElementById("TabsToolbar");
  var verticalTabs = doc.getElementById("vertical-tabs");
  var newTabBtn = doc.getElementById("vertical-tabs-newtab-button");
  var sidebarMain = doc.getElementById("sidebar-main");

  // --- XUL orient attributes ---

  if (ptc) ptc.setAttribute("orient", "horizontal");
  if (tabs) tabs.setAttribute("orient", "horizontal");
  if (box) box.setAttribute("orient", "horizontal");

  var splitter = doc.getElementById("vertical-pinned-tabs-splitter");
  if (splitter) splitter.setAttribute("orient", "horizontal");

  // --- Inline styles for properties that CSS cannot override ---
  // Floorp's internal styles set max-height:36px on arrowscrollbox[orient="horizontal"]
  // with specificity that beats <style> rules — only inline !important wins.

  if (ptc) {
    ptc.style.setProperty("height", "120px", "important");
    ptc.style.setProperty("max-height", "120px", "important");
  }

  if (tabs) {
    tabs.style.setProperty("height", "120px", "important");
    tabs.style.setProperty("max-height", "120px", "important");
  }

  if (box) {
    box.style.setProperty("width", "800px", "important");
    box.style.setProperty("height", "120px", "important");
    box.style.setProperty("max-height", "120px", "important");
    box.style.setProperty("margin-left", "-4px", "important");
  }

  // --- Shadow DOM: scrollbox overflow ---

  if (box && box.shadowRoot) {
    var scrollbox = box.shadowRoot.querySelector("scrollbox");
    if (scrollbox) {
      scrollbox.style.setProperty("overflow", "hidden", "important");
    }
  }

  if (ptc && ptc.shadowRoot) {
    var ptcScrollbox = ptc.shadowRoot.querySelector("scrollbox");
    if (ptcScrollbox) {
      ptcScrollbox.style.setProperty("overflow", "hidden", "important");
    }
  }

  // --- DOM relocation ---

  if (tabsToolbar && verticalTabs) {
    tabsToolbar.appendChild(verticalTabs);
  }

  if (newTabBtn && sidebarMain) {
    newTabBtn.after(sidebarMain);
  }

  // --- Sidebar Shadow DOM ---

  styleSidebar(sidebarMain);

  // --- MutationObserver ---

  if (tabs) {
    var rafPending = false;

    function scheduleUpdate() {
      if (rafPending) return;
      rafPending = true;
      win.requestAnimationFrame(function() {
        rafPending = false;

        doc.querySelectorAll(".tabbrowser-tab:not([pinned]):not([fadein])").forEach(function(t) {
          t.remove();
        });

        if (newTabBtn) {
          var count = doc.querySelectorAll(".tabbrowser-tab:not([pinned])[fadein]").length;
          if (count >= MAX_NORMAL_TABS) {
            newTabBtn.setAttribute("data-htabs-hidden", "");
          }
          else {
            newTabBtn.removeAttribute("data-htabs-hidden");
          }
        }

        if (ptc) {
          var pinnedCount = doc.querySelectorAll(".tabbrowser-tab[pinned]").length;
          var columns = Math.ceil(pinnedCount / 3);
          var minWidth = Math.max(160, columns * 40);
          ptc.style.setProperty("min-width", minWidth + "px", "important");
        }
      });
    }

    scheduleUpdate();

    new win.MutationObserver(scheduleUpdate).observe(tabs, {
      childList: true,
      subtree: true,
      attributes: true,
      attributeFilter: ["fadein", "pinned"]
    });
  }
}


function styleSidebar(sidebarMain) {
  if (!sidebarMain) return;

  var innerSidebar = sidebarMain.querySelector("sidebar-main");
  if (!innerSidebar || !innerSidebar.shadowRoot) return;

  var wrapper = innerSidebar.shadowRoot.querySelector(".wrapper");
  if (!wrapper) return;

  var buttonsWrapper = wrapper.querySelector(".buttons-wrapper");
  if (buttonsWrapper) {
    buttonsWrapper.style.setProperty("flex-direction", "column", "important");
    buttonsWrapper.style.setProperty("margin-top", "8px", "important");
  }

  var buttonGroup = wrapper.querySelector("button-group");
  if (buttonGroup) {
    buttonGroup.style.setProperty("display", "grid", "important");
    buttonGroup.style.setProperty("grid-template-columns", "repeat(3, 38px)", "important");
    buttonGroup.style.setProperty("grid-template-rows", "repeat(2, 38px)", "important");
    buttonGroup.style.setProperty("gap", "0", "important");
    buttonGroup.style.setProperty("padding", "0", "important");
    buttonGroup.style.setProperty("margin", "0", "important");

    buttonGroup.querySelectorAll("moz-button").forEach(function(btn) {
      btn.style.cssText = "visibility: visible; width: 38px !important; height: 38px !important;";
      var inner = btn.shadowRoot && btn.shadowRoot.querySelector("button");
      if (inner) {
        inner.style.setProperty("height", "38px", "important");
        inner.style.setProperty("min-height", "38px", "important");
        inner.style.setProperty("padding", "1px", "important");
      }
    });
  }

  var splitter = wrapper.querySelector("splitter");
  if (splitter) {
    splitter.style.setProperty("display", "none", "important");
  }

  // Inject style into shadow DOM — inline styles on splitter may not persist
  var shadowStyle = innerSidebar.shadowRoot.querySelector("#htabs-sidebar-style");
  if (!shadowStyle) {
    shadowStyle = innerSidebar.shadowRoot.ownerDocument.createElement("style");
    shadowStyle.id = "htabs-sidebar-style";
    shadowStyle.textContent = "splitter { display: none !important; }";
    innerSidebar.shadowRoot.prepend(shadowStyle);
  }
}
