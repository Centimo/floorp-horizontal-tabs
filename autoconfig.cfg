// Floorp autoconfig bootstrap
// Loads chrome/horizontal_tabs.{css,js} from the active profile.
try {

var { Services } = ChromeUtils.import("resource://gre/modules/Services.jsm");
var Cc = Components.classes;
var Ci = Components.interfaces;

var chromeDir = Services.dirsvc.get("ProfD", Ci.nsIFile);
chromeDir.append("chrome");

// --- CSS ---

var cssFile = chromeDir.clone();
cssFile.append("horizontal_tabs.css");

if (cssFile.exists()) {
  var sss = Cc["@mozilla.org/content/style-sheet-service;1"].getService(Ci.nsIStyleSheetService);
  var cssURI = Services.io.newFileURI(cssFile);
  if (!sss.sheetRegistered(cssURI, sss.AGENT_SHEET)) {
    sss.loadAndRegisterSheet(cssURI, sss.AGENT_SHEET);
  }
}

// --- JS ---

var jsFile = chromeDir.clone();
jsFile.append("horizontal_tabs.js");

if (jsFile.exists()) {
  var jsURI = Services.io.newFileURI(jsFile).spec;

  Services.obs.addObserver({
    observe: function(subject) {
      subject.addEventListener("DOMContentLoaded", function() {
        if (subject.document.documentURI !== "chrome://browser/content/browser.xhtml") return;
        Services.scriptloader.loadSubScript(jsURI, subject);
      }, { once: true });
    }
  }, "chrome-document-global-created", false);
}

} catch(e) {
  Components.utils.reportError("Autoconfig bootstrap: " + e);
}
